<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简 PPT 生成器 — Minimal PPT Generator</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans SC"', '"Inter"', 'system-ui', '-apple-system', 'sans-serif'],
            display: ['"Playfair Display"', '"Noto Serif SC"', 'Georgia', 'serif'],
            mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- PptxGenJS -->
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans antialiased transition-colors duration-300">

  <!-- ========== 导航栏 ========== -->
  <header class="fixed top-0 left-0 right-0 z-40 bg-[var(--header-bg)] backdrop-blur-xl border-b border-[var(--border-color)]">
    <div class="max-w-[1800px] mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--accent-color);">
          <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
        </div>
        <span class="font-semibold text-sm tracking-tight" style="color: var(--text-main);">极简 PPT 生成器</span>
      </div>
      <div class="flex items-center gap-2">
        <!-- 加载指示器 -->
        <span id="loadingIndicator" style="display:none;" class="flex items-center gap-1.5 text-xs" style="color: var(--accent-color);">
          <span class="inline-block w-3.5 h-3.5 border-2 border-current border-t-transparent rounded-full animate-spin"></span>
          渲染中…
        </span>
        <button onclick="renderAllSlides()"
                class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border transition-all duration-200"
                style="background: var(--slide-bg); color: var(--text-main); border-color: var(--border-color);">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          刷新预览
        </button>
        <button onclick="exportToRealPPTX()"
                class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-white transition-all duration-200 shadow-sm hover:shadow-md"
                style="background: var(--accent-color);">
          <i data-lucide="download" class="w-4 h-4"></i>
          导出 PPTX
        </button>
        <button onclick="openAIModal()"
                class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg border transition-all duration-200"
                style="background: var(--slide-bg); color: var(--text-main); border-color: var(--border-color);">
          <i data-lucide="bot" class="w-4 h-4"></i>
          AI 生成
        </button>
      </div>
    </div>
  </header>

  <!-- ========== 主体布局 ========== -->
  <main class="pt-14 h-screen flex">

    <!-- 左侧控制面板 -->
    <aside class="w-[420px] min-w-[360px] h-full flex flex-col border-r overflow-y-auto"
           style="background: var(--panel-bg); border-color: var(--border-color);">

      <!-- 主题选择器 -->
      <div class="px-6 pt-5 pb-3">
        <label class="flex items-center gap-2 text-xs font-medium uppercase tracking-wider mb-3" style="color: var(--text-secondary);">
          <i data-lucide="palette" class="w-3.5 h-3.5"></i> 主题风格
        </label>
        <div class="grid grid-cols-2 gap-2" id="themeSelector">
          <button data-theme="minimal-white" onclick="switchTheme('minimal-white')"
                  class="theme-btn active flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-medium transition-all duration-200 border-2">
            <span class="w-4 h-4 rounded-full border border-gray-300" style="background:#fff;"></span>
            极简原白
          </button>
          <button data-theme="cyber-dark" onclick="switchTheme('cyber-dark')"
                  class="theme-btn flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-medium transition-all duration-200 border-2">
            <span class="w-4 h-4 rounded-full" style="background:#1a1a2e;"></span>
            极客暗黑
          </button>
          <button data-theme="morandi-warm" onclick="switchTheme('morandi-warm')"
                  class="theme-btn flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-medium transition-all duration-200 border-2">
            <span class="w-4 h-4 rounded-full" style="background:#d4c5b9;"></span>
            莫兰迪棕
          </button>
          <button data-theme="forest-zen" onclick="switchTheme('forest-zen')"
                  class="theme-btn flex items-center gap-2 px-3 py-2.5 rounded-lg text-xs font-medium transition-all duration-200 border-2">
            <span class="w-4 h-4 rounded-full" style="background:#c8d6c0;"></span>
            森系青绿
          </button>
        </div>
      </div>

      <div class="mx-6 border-t" style="border-color: var(--border-color);"></div>

      <!-- Markdown 编辑器 -->
      <div class="flex-1 flex flex-col min-h-0">
        <div class="px-6 pt-4 pb-2 flex items-center justify-between">
          <label class="flex items-center gap-2 text-xs font-medium uppercase tracking-wider" style="color: var(--text-secondary);">
            <i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Markdown 文案
          </label>
          <button onclick="loadSample()" class="text-xs font-medium transition-colors" style="color: var(--accent-color);">
            加载示例
          </button>
        </div>
        <textarea id="markdownInput"
                  class="flex-1 w-full resize-none outline-none px-6 py-3 text-sm leading-relaxed font-mono scroll-smooth transition-colors duration-300"
                  style="background: var(--panel-bg); color: var(--text-main); caret-color: var(--accent-color);"
                  placeholder="# 在此粘贴 Markdown 文案…&#10;&#10;用 --- 分隔每一页幻灯片&#10;&#10;## 第二页&#10;内容在此…"
                  oninput="handleInput()"></textarea>
        <div class="px-6 py-3 flex items-center gap-4 text-xs" style="color: var(--text-secondary);">
          <span class="flex items-center gap-1"><i data-lucide="info" class="w-3 h-3"></i> 用 <code class="px-1.5 py-0.5 rounded text-[11px]" style="background: var(--border-color);">---</code> 分隔幻灯片</span>
          <span id="slideCount">共 0 张幻灯片</span>
        </div>
      </div>
    </aside>

    <!-- 右侧预览面板 -->
    <section class="flex-1 h-full flex flex-col items-center" style="background: var(--bg-primary);">
      <div class="w-full px-8 py-3 flex items-center justify-between" style="color: var(--text-secondary);">
        <span class="text-xs font-medium uppercase tracking-wider flex items-center gap-2">
          <i data-lucide="eye" class="w-3.5 h-3.5"></i> 实时预览
        </span>
        <div class="flex items-center gap-3">
          <button onclick="prevSlide()" id="btnPrev"
                  class="p-2 rounded-lg transition-colors disabled:opacity-30"
                  style="color: var(--text-main);" title="上一页">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
          </button>
          <span id="slideIndicator" class="text-sm font-medium tabular-nums min-w-[60px] text-center" style="color: var(--text-main);">—</span>
          <button onclick="nextSlide()" id="btnNext"
                  class="p-2 rounded-lg transition-colors disabled:opacity-30"
                  style="color: var(--text-main);" title="下一页">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </div>
      </div>

      <!-- 幻灯片预览视口 -->
      <div class="flex-1 w-full flex items-center justify-center p-8 overflow-hidden">
        <div id="slideViewport"
             class="relative w-full max-w-[960px] rounded-2xl overflow-hidden transition-all duration-500 shadow-2xl"
             style="aspect-ratio: 16 / 9; background: var(--slide-bg);">
          <!-- 空状态 -->
          <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center"
               style="color: var(--text-tertiary);">
            <i data-lucide="file-text" class="w-12 h-12 mb-3 opacity-20"></i>
            <p class="text-sm font-light">在左侧输入 Markdown 开始预览</p>
          </div>
          <!-- 幻灯片内容（不使用 Tailwind hidden，改用 inline style） -->
          <div id="slideContent" class="absolute inset-0 p-16 flex flex-col justify-center"
               style="display:none;">
            <div id="slideTitle" class="font-display font-semibold leading-tight mb-6 transition-all duration-300"
                 style="font-size: 2.8rem; color: var(--text-main); letter-spacing: -0.02em;"></div>
            <div id="slideSubtitle" class="font-sans font-light leading-relaxed mb-8 transition-all duration-300"
                 style="font-size: 1.35rem; color: var(--text-secondary);"></div>
            <div id="slideBody" class="font-sans font-light leading-loose transition-all duration-300"
                 style="font-size: 1.1rem; color: var(--text-body);"></div>
          </div>
          <!-- 页码 -->
          <div id="slidePageNumber" class="absolute bottom-6 right-8 text-xs font-medium opacity-40"
               style="color: var(--text-secondary); display:none;"></div>
          <!-- 点缀装饰线 -->
          <div class="absolute top-12 left-16 w-12 h-[2px] rounded-full opacity-30 transition-all duration-500"
               style="background: var(--accent-color);"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== AI 配置弹窗 ========== -->
  <div id="aiModal"
       style="position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);">
    <div class="w-full max-w-lg mx-4 rounded-2xl p-8 shadow-2xl transition-colors duration-300"
         style="background: var(--slide-bg); color: var(--text-main);">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold flex items-center gap-2">
          <i data-lucide="bot" class="w-5 h-5" style="color: var(--accent-color);"></i>
          AI 智能生成
        </h3>
        <button onclick="closeAIModal()" class="p-1.5 rounded-lg transition-colors hover:opacity-60"
                style="color: var(--text-secondary);">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">API 端点 (Endpoint)</label>
          <input id="aiEndpoint" type="text" value="https://api.deepseek.com/v1/chat/completions"
                 class="w-full px-3 py-2.5 rounded-lg text-sm outline-none border transition-colors duration-300"
                 style="background: var(--panel-bg); border-color: var(--border-color); color: var(--text-main);">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">API Key</label>
          <input id="aiKey" type="password" placeholder="sk-…"
                 class="w-full px-3 py-2.5 rounded-lg text-sm outline-none border transition-colors duration-300 font-mono"
                 style="background: var(--panel-bg); border-color: var(--border-color); color: var(--text-main);">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">模型名称</label>
          <input id="aiModel" type="text" value="deepseek-chat"
                 class="w-full px-3 py-2.5 rounded-lg text-sm outline-none border transition-colors duration-300"
                 style="background: var(--panel-bg); border-color: var(--border-color); color: var(--text-main);">
        </div>
        <div>
          <label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">PPT 主题 / 关键词</label>
          <input id="aiPrompt" type="text" placeholder="例如：人工智能的未来趋势、产品发布会、团队年度总结…"
                 class="w-full px-3 py-2.5 rounded-lg text-sm outline-none border transition-colors duration-300"
                 style="background: var(--panel-bg); border-color: var(--border-color); color: var(--text-main);">
        </div>
      </div>

      <div class="flex items-center gap-3 mt-6">
        <button onclick="generateWithAI()" id="btnAIGenerate"
                class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium text-white transition-all duration-200"
                style="background: var(--accent-color);">
          <i data-lucide="wand-2" class="w-4 h-4"></i>
          <span id="aiBtnText">生成 PPT 文案</span>
        </button>
        <button onclick="closeAIModal()"
                class="px-4 py-2.5 rounded-lg text-sm font-medium border transition-colors duration-300"
                style="border-color: var(--border-color); color: var(--text-secondary);">
          取消
        </button>
      </div>

      <!-- AI 状态（不使用 Tailwind hidden） -->
      <div id="aiStatus" class="mt-3 text-xs text-center" style="display:none;color:var(--text-secondary);"></div>
    </div>
  </div>

  <!-- JS（先加载 AI 模块，再加载核心引擎） -->
  <script src="ai-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
